<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuvarok – Utazz Velem</title>
  <meta name="description" content="Böngészd az elérhető fuvarokat indulási hely, érkezési hely és dátum szerint." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="index.html">
        <img src="assets/logo-utazzvelem.svg" alt="Utazz Velem logó" />
        <span data-setting="siteName">Utazz Velem</span>
      </a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html" class="active">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
        <a href="admin.html" class="nav-cta" data-admin-link hidden>Admin</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow">Keresés</span>
          <h1>Elérhető fuvarok</h1>
          <p class="lead small">Szűrj útvonal és dátum alapján, majd vedd fel a kapcsolatot a hirdetővel.</p>
        </div>
      </div>

      <form id="tripFilterForm" class="card filter-bar grid-4 glass-glow">
        <label>
          <span>Indulási hely</span>
          <input type="text" id="filterOrigin" placeholder="pl. Budapest" />
        </label>
        <label>
          <span>Érkezési hely</span>
          <input type="text" id="filterDestination" placeholder="pl. Debrecen" />
        </label>
        <label>
          <span>Dátum</span>
          <input type="date" id="filterDate" />
        </label>
        <label>
          <span>&nbsp;</span>
          <button type="submit" class="btn btn-primary btn-full">Szűrés</button>
        </label>
      </form>

      <div id="tripsList" class="list-stack"></div>
    </div>
  </main>

  <footer class="site-footer compact-footer">
    <div class="container footer-grid">
      <div>
        <strong data-setting="siteName">Utazz Velem</strong>
      </div>
      <div>
        <p>E-mail: <span data-setting="email">info@utazzvelem.hu</span></p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
