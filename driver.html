<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofőr profil – FuvarVelünk</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo-wrap" href="index.html">
        <img src="assets/logo-fuvarvelunk.svg" alt="FuvarVelünk">
        <span data-brand>FuvarVelünk</span>
      </a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
        <a href="belepes.html" data-auth="guest">Belépés / regisztráció</a>
        <span data-user-label data-auth="user" class="nav-user hidden"></span>
        <a href="admin.html" data-auth="admin" class="hidden">Admin</a>
        <button type="button" data-auth="user" data-logout class="hidden">Kilépés</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <span class="eyebrow">Sofőr profil</span>
      <h1 class="page-title">Megbízható sofőr adatai</h1>
      <div id="driverProfileCard" class="card driver-profile-card"></div>
      <div class="two-col" style="margin-top:24px">
        <section class="card">
          <h2>Aktív fuvarok</h2>
          <div id="driverTrips" class="cards"></div>
        </section>
        <section class="card">
          <h2>Kapcsolat</h2>
          <p>A sofőrnek kérdést a fuvar részleteinél tudsz küldeni.</p>
          <div id="driverContactBox" class="notice">Tölts be egy sofőrt a fuvarok oldalról vagy a részletek oldalról.</div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
