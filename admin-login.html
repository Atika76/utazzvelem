<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin belépés – Utazz Velem</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-admin-login-page>
  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="index.html">
        <img src="assets/logo-utazzvelem.svg" alt="Utazz Velem logó" />
        <span data-setting="siteName">Utazz Velem</span>
      </a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container narrow">
      <section class="card glass-glow auth-card">
        <span class="eyebrow">Védett admin</span>
        <h1 id="authModeLabel">Admin belépés</h1>
        <p class="lead small">Csak a beállított admin e-mail címmel lehet belépni ezen az oldalon.</p>
        <p class="lead small">Jelenlegi admin: <strong data-admin-email-display>cegweb26@gmail.com</strong></p>
        <form id="adminLoginForm" class="form-stack">
          <input type="hidden" id="authMode" name="mode" value="signin" />
          <label><span>Admin e-mail</span><input type="email" name="email" placeholder="cegweb26@gmail.com" required /></label>
          <label><span>Jelszó</span><input type="password" name="password" placeholder="Legalább 6 karakter" required /></label>
          <button type="submit" class="btn btn-primary">Belépés</button>
          <button type="button" class="btn btn-secondary" id="authModeSwitch">Első használat? Fiók létrehozása</button>
          <p id="adminLoginMessage" class="form-message"></p>
        </form>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
