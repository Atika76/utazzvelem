<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css" />
  <title>Fuvarok – Utazz Velem</title>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo-wrap" href="index.html"><img src="assets/logo-utazzvelem.svg" alt="Utazz Velem logo"><span data-brand>Utazz Velem</span></a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
        <a href="belepes.html" data-auth="guest">Belépés / regisztráció</a>
        <span class="user-chip hidden" data-auth="user" data-user-name></span>
        <a href="admin.html" data-auth="admin" class="hidden">Admin</a>
        <button type="button" data-auth="user" data-logout class="linkish hidden">Kilépés</button>
      </nav>
    </div>
  </header>
  <main class="section">
    <div class="container">
      <div class="section-head"><div><span class="eyebrow">Keresés</span><h1 class="page-title">Elérhető fuvarok</h1></div></div>
      <form id="tripFilterForm" class="card grid-4">
        <label><span>Indulási hely</span><input id="filterOrigin" placeholder="pl. Budapest"></label>
        <label><span>Érkezési hely</span><input id="filterDestination" placeholder="pl. Győr"></label>
        <label><span>Dátum</span><input id="filterDate" type="date"></label>
        <label><span>&nbsp;</span><button class="btn btn-primary" type="submit">Szűrés</button></label>
      </form>
      <div class="section" style="padding-top:22px;padding-bottom:22px">
        <div class="card map-card">
          <div class="section-head" style="margin-bottom:14px"><div><span class="eyebrow">OpenStreetMap</span><h2 style="font-size:1.5rem;margin:6px 0 0">Útvonal előnézet</h2></div></div>
          <div id="tripsMap"></div>
        </div>
      </div>
      <div id="tripsList" class="trip-list"></div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
