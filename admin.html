<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css" />
  <title>Admin – Utazz Velem</title>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo-wrap" href="index.html"><img src="assets/logo-utazzvelem.svg" alt="Utazz Velem logo"><span data-brand>Utazz Velem</span></a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
        <a href="belepes.html" data-auth="guest">Belépés / regisztráció</a>
        <span class="user-chip hidden" data-auth="user" data-user-name></span>
        <a href="admin.html" data-auth="admin" class="hidden">Admin</a>
        <button type="button" data-auth="user" data-logout class="linkish hidden">Kilépés</button>
      </nav>
    </div>
  </header>
  <main class="section">
    <div class="container admin-grid">
      <section class="card">
        <span class="eyebrow">Beállítások</span>
        <h1 class="page-title">Weboldal adatai</h1>
        <form id="settingsForm" class="form-stack">
          <label><span>Weboldal neve</span><input name="siteName"></label>
          <label><span>Vállalkozás neve</span><input name="companyName"></label>
          <label><span>Bemutatkozás</span><textarea name="description"></textarea></label>
          <div class="grid-2">
            <label><span>E-mail cím</span><input name="email"></label>
            <label><span>Telefonszám</span><input name="phone"></label>
          </div>
          <div class="grid-2">
            <label><span>Város / telephely</span><input name="city"></label>
            <label><span>Admin e-mail</span><input name="adminEmail" type="email"></label>
          </div>
          <div class="form-message" id="settingsMsg"></div>
          <button class="btn btn-primary" type="submit">Beállítások mentése</button>
        </form>
      </section>
      <section>
        <div class="card" style="margin-bottom:18px">
          <div class="section-head"><div><span class="eyebrow">Beküldött fuvarok</span><h2 style="font-size:2rem;margin:8px 0 0">Hirdetések</h2></div></div>
          <div id="adminTrips" class="table-like"></div>
        </div>
        <div class="card">
          <div class="section-head"><div><span class="eyebrow">Foglalások</span><h2 style="font-size:2rem;margin:8px 0 0">Utas foglalások</h2></div></div>
          <div id="adminBookings" class="table-like"></div>
        </div>
      </section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
