<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css" />
  <title>Fuvar feladása – Utazz Velem</title>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo-wrap" href="index.html"><img src="assets/logo-utazzvelem.svg" alt="Utazz Velem logo"><span data-brand>Utazz Velem</span></a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
        <a href="belepes.html" data-auth="guest">Belépés / regisztráció</a>
        <span class="user-chip hidden" data-auth="user" data-user-name></span>
        <a href="admin.html" data-auth="admin" class="hidden">Admin</a>
        <button type="button" data-auth="user" data-logout class="linkish hidden">Kilépés</button>
      </nav>
    </div>
  </header>
  <main class="section">
    <div class="narrow">
      <div class="section-head"><div><span class="eyebrow">Új fuvar</span><h1 class="page-title">Fuvar feladása</h1><p class="lead">Fuvar feladása csak regisztráció és belépés után lehetséges.</p></div></div>
      <form id="tripForm" class="card form-stack">
        <div class="grid-2">
          <label><span>Név</span><input name="driverName" required placeholder="Sofőr neve"></label>
          <label><span>Kapcsolati e-mail</span><input name="contactEmail" type="email" required></label>
        </div>
        <div class="grid-2">
          <label><span>Telefonszám</span><input name="phone" required placeholder="pl. +36 30 123 4567"></label>
          <label><span>Autó típusa</span><input name="carType" placeholder="pl. Skoda Octavia"></label>
        </div>
        <div class="grid-2">
          <label><span>Indulási hely</span><input name="origin" required></label>
          <label><span>Érkezési hely</span><input name="destination" required></label>
        </div>
        <div class="grid-3">
          <label><span>Dátum</span><input name="date" type="date" required></label>
          <label><span>Indulási idő</span><input name="time" type="time" required></label>
          <label><span>Ár / fő (Ft)</span><input name="price" type="number" min="0" step="100" required></label>
        </div>
        <div class="grid-2">
          <label><span>Hány személyes az autó?</span><input name="osszHely" type="number" min="1" max="8" value="4" required></label>
          <label><span>Mennyi szabad hely van most?</span><input name="szabadHely" type="number" min="1" max="8" value="4" required></label>
        </div>
        <div>
          <span>Fizetés</span>
          <div class="inline-pills" style="margin-top:10px">
            <span class="pill">Készpénz a helyszínen</span>
          </div>
          <div class="small-help" style="margin-top:8px">A fizetős online megoldást később kapcsoljuk be. Induláskor a foglalás készpénzes.</div>
        </div>
        <label><span>Megjegyzés</span><textarea name="note" placeholder="pl. kisebb csomag elfér, megállás megbeszélés szerint"></textarea></label>
        <div class="form-message" id="tripFormMsg"></div>
        <button class="btn btn-primary" type="submit">Fuvar beküldése</button>
      </form>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
