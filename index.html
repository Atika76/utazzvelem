<!DOCTYPE html>
<html lang="hu">
<head>

<title>Utazz Velem – Fuvarmegosztó</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#0f172a;

}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.hero{
padding:80px 20px;

}

.hero h1{

.cards{

<br>

</section>

<section class="cards">

<div class="card">
<h3>Fuvar keresés</h3>
<p>Keress autós utazást városok között.</p>
</div>

<div class="card">
<h3>Fuvar feladás</h3>
<p>Hirdess meg szabad helyet az autódban.</p>
</div>

<div class="card">
<h3>Közösség</h3>

<footer>
